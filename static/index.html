<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>URL Shortener</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #111;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      color: #333;
      margin-bottom: 0.5rem;
    }

    input[type="url"] {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1rem;
    }

    input[type="url"]:focus {
      border-color: #6c63ff;
    }

    button {
      width: 100%;
      padding: 0.8rem;
      background: #6c63ff;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover { background: #5a52d5; }
    button:active { transform: scale(0.98); }
    button:disabled { background: #aaa; cursor: not-allowed; }

    .result {
      margin-top: 1.5rem;
      padding: 1rem 1.25rem;
      background: #f0eeff;
      border-radius: 10px;
      border: 1px solid #d4cfff;
      display: none;
    }

    .result.show { display: block; }

    .result-label {
      font-size: 0.8rem;
      font-weight: 500;
      color: #6c63ff;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
    }

    .result-link {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .result-link a {
      font-size: 1.1rem;
      font-weight: 600;
      color: #111;
      word-break: break-all;
      text-decoration: none;
    }

    .result-link a:hover { text-decoration: underline; }

    .copy-btn {
      width: auto;
      padding: 0.3rem 0.75rem;
      font-size: 0.8rem;
      font-weight: 500;
      background: #6c63ff;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .error {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      background: #fff0f0;
      border-radius: 8px;
      color: #c0392b;
      font-size: 0.9rem;
      display: none;
    }

    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔗 URL Shortener</h1>
    <p class="subtitle">Paste a long URL and get a short link instantly.</p>

    <label for="url-input">Long URL</label>
    <input
      type="url"
      id="url-input"
      placeholder="https://example.com/very/long/url"
    />

    <button id="shorten-btn" onclick="shortenURL()">Shorten URL</button>

    <div class="result" id="result-box">
      <div class="result-label">Your short link</div>
      <div class="result-link">
        <a id="short-link" href="#" target="_blank"></a>
        <button class="copy-btn" onclick="copyLink()">Copy</button>
      </div>
    </div>

    <div class="error" id="error-box"></div>
  </div>

  <script>
    async function shortenURL() {
      const input = document.getElementById('url-input');
      const btn = document.getElementById('shorten-btn');
      const resultBox = document.getElementById('result-box');
      const errorBox = document.getElementById('error-box');
      const shortLink = document.getElementById('short-link');

      const url = input.value.trim();
      if (!url) return;

      // Reset UI
      resultBox.classList.remove('show');
      errorBox.classList.remove('show');
      btn.disabled = true;
      btn.textContent = 'Shortening...';

      try {
        // POST to our FastAPI backend
        const response = await fetch('/shorten', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ long_url: url })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.detail || 'Something went wrong');
        }

        // Show the result
        shortLink.textContent = data.short_url;
        shortLink.href = data.short_url;
        resultBox.classList.add('show');

      } catch (err) {
        errorBox.textContent = '⚠️ ' + err.message;
        errorBox.classList.add('show');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Shorten URL';
      }
    }

    function copyLink() {
      const link = document.getElementById('short-link').textContent;
      navigator.clipboard.writeText(link).then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy', 2000);
      });
    }

    // Allow pressing Enter to submit
    document.getElementById('url-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') shortenURL();
    });
  </script>
</body>
</html>
